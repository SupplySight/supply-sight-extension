<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="styles.css" />
		<title>SupplyChain Sleuth</title>
	</head>
	<body>
		<div class="popup-container">
			<header class="popup-header">
				<div class="popup-header-inner">
					<div class="popup-logo-pill">
						<div class="popup-logo-shield"></div>
					</div>
					<div class="popup-header-text">
						<h1 class="popup-header-title">Supply Sight</h1>
						<p class="popup-header-subtitle">
							Ethical Shopping Intelligence
						</p>
					</div>
				</div>
			</header>

			<main class="popup-main">
				<!-- Risk summary card -->
				<section id="risk-card" class="risk-card risk-medium">
					<div class="risk-card-icon-wrap">
						<div class="risk-card-icon-pill">
							<img
								src="images/triangle-alert.svg"
								id="risk-icon"
								alt="Risk icon"
							/>
						</div>
					</div>
					<div class="risk-card-content">
						<h2 id="risk-label" class="risk-card-title">
							Some Risk Factors Found
						</h2>
						<p
							id="risk-score-description"
							class="risk-card-subtitle"
						>
							Some concerns have been identified. Review the
							details below.
						</p>
					</div>
				</section>

				<!-- Brand and score card -->
				<section class="brand-score-card">
					<div class="brand-score-header">
						<div class="brand-meta">
							<p class="brand-label">Brand</p>
							<p class="brand-name" id="brand-name">
								Ben &amp; Jerry&apos;s
							</p>
						</div>
					</div>

					<div class="score-row">
						<div class="score-label-group">
							<p class="score-label">Social Cost Score</p>
						</div>
						<div class="score-value">
							<span id="risk-score" class="score-number">65</span>
							<span class="score-max">/ 100</span>
						</div>
					</div>

					<div class="score-bar">
						<div class="score-bar-fill" id="score-bar-fill"></div>
					</div>
					<p class="score-help-text">
						Lower scores indicate better ethical practices
					</p>
				</section>
				<div id="loading-indicator" class="loading-row hidden">
					<div class="spinner"></div>
					<span class="loading-text">Analyzing product…</span>
				</div>
			</main>
		</div>

		<script src="productController.js"></script>
		<script src="index.js"></script>
	</body>
</html>
